<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RDP Ambient Sounds</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
}

button {
    background: #1db954;
    border: none;
    color: white;
    padding: 15px 25px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>🦷 RDP Ambient Sounds</h1>

<button onclick="setMode('calm')">🦷 Waiting Room</button>
<button onclick="setMode('neutral')">🛠 Treatment</button>
<button onclick="setMode('uplift')">☕ Staff</button>

<br><br>

<!-- 🔥 THIS WAS MISSING -->
<audio id="player" controls autoplay></audio>

<script>

document.addEventListener("DOMContentLoaded", () => {

const playlists = {
    calm: [
        "Lifted.mp3",
        "Used to This.mp3",
        "84-85.mp3",
        "Mystical Magical.mp3",
        "No Time To Talk.mp3",
        "Tangerine.mp3"
    ],
    neutral: [
        "Lifted.mp3",
        "Used to This.mp3"
    ],
    uplift: [
        "Tangerine.mp3"
    ]
};

let currentList = "calm";
let currentTrack = 0;

const player = document.getElementById("player");

if (!player) {
    console.error("Player not found!");
    return;
}

let nextAudio = new Audio();
let fading = false;
let userVolume = 1;

player.addEventListener("volumechange", () => {
    userVolume = player.volume;
});

function playTrack() {
    const src = "./" + currentList + "/" + playlists[currentList][currentTrack];
    player.src = src;
    player.volume = userVolume;

    player.play().catch(() => {});

    preloadNext();
}

function preloadNext() {
    let nextIndex = (currentTrack + 1) % playlists[currentList].length;
    nextAudio = new Audio("./" + currentList + "/" + playlists[currentList][nextIndex]);
    nextAudio.volume = 0;
}

player.addEventListener("timeupdate", () => {
    if (
        !fading &&
        player.duration &&
        !isNaN(player.duration) &&
        player.duration - player.currentTime < 3
    ) {
        startCrossfade();
    }
});

function startCrossfade() {
    fading = true;

    nextAudio.currentTime = 0;
    nextAudio.play().catch(() => {});

    let fade = 0;

    let interval = setInterval(() => {
        fade += 0.05;

        player.volume = userVolume * (1 - fade);
        nextAudio.volume = userVolume * fade;

        if (fade >= 1) {
            clearInterval(interval);

            player.pause();

            player.src = nextAudio.src;
            player.volume = userVolume;
            player.play().catch(() => {});

            currentTrack = (currentTrack + 1) % playlists[currentList].length;

            preloadNext();
            fading = false;
        }
    }, 200);
}

function setMode(mode) {
    currentList = mode;
    currentTrack = 0;
    fading = false;

    nextAudio.pause();
    playTrack();
}

playTrack();

});

</script>

</body>
</html>
