<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RDP Ambient Sounds</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
}

button {
    background: #1db954;
    border: none;
    color: white;
    padding: 15px 25px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
}

audio {
    margin-top: 20px;
    width: 80%;
}
</style>
</head>

<body>

<h1>🦷 RDP Ambient Sounds</h1>

<button onclick="setMode('calm')">🦷 Waiting Room</button>
<button onclick="setMode('neutral')">🛠 Treatment</button>
<button onclick="setMode('uplift')">☕ Staff</button>

<br><br>

<audio id="player" controls autoplay></audio>

<script>

const playlists = {
    calm: [
        "Lifted.mp3",
        "Used to This.mp3",
        "84-85.mp3",
        "Mystical Magical.mp3",
        "No Time To Talk.mp3",
        "Tangerine.mp3"
    ],
    neutral: [
        "Lifted.mp3",
        "Used to This.mp3"
    ],
    uplift: [
        "Tangerine.mp3"
    ]
};

let currentList = "calm";
let currentTrack = 0;

const player = document.getElementById("player");

let nextAudio = new Audio();
let fading = false;

// Sync volume with UI
function syncVolume() {
    nextAudio.volume = player.volume;
}

// 🔥 Play current track
function playTrack() {
    const src = "./" + currentList + "/" + playlists[currentList][currentTrack];
    player.src = src;
    player.play();

    preloadNext();
}

// 🔥 Preload next track
function preloadNext() {
    let nextIndex = (currentTrack + 1) % playlists[currentList].length;
    nextAudio.src = "./" + currentList + "/" + playlists[currentList][nextIndex];
    nextAudio.volume = 0;
}

// 🔥 Crossfade
player.addEventListener("timeupdate", () => {
    if (player.duration - player.currentTime < 3 && !fading) {
        startCrossfade();
    }
});

function startCrossfade() {
    fading = true;

    nextAudio.currentTime = 0;
    nextAudio.play();

    let fadeInterval = setInterval(() => {
        player.volume -= 0.05;
        nextAudio.volume += 0.05;

        if (player.volume <= 0) {
            clearInterval(fadeInterval);

            player.pause();

            // Switch to next
            player.src = nextAudio.src;
            player.volume = 1;
            player.play();

            currentTrack = (currentTrack + 1) % playlists[currentList].length;

            preloadNext();
            fading = false;
        }
    }, 200);
}

// 🔥 Keep volume in sync
player.addEventListener("volumechange", syncVolume);

// Mode switching
function setMode(mode) {
    currentList = mode;
    currentTrack = 0;
    fading = false;

    nextAudio.pause();
    nextAudio = new Audio();

    playTrack();
}

// Start
playTrack();

</script>
</body>
</html>
