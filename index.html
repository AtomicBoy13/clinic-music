<script>

document.addEventListener("DOMContentLoaded", () => {

const playlists = {
    calm: [
        "Lifted.mp3",
        "Used to This.mp3",
        "84-85.mp3",
        "Mystical Magical.mp3",
        "No Time To Talk.mp3",
        "Tangerine.mp3"
    ],
    neutral: [
        "Lifted.mp3",
        "Used to This.mp3"
    ],
    uplift: [
        "Tangerine.mp3"
    ]
};

let currentList = "calm";
let currentTrack = 0;

const player = document.getElementById("player");

let nextAudio = new Audio();
let fading = false;
let userVolume = 1;

// Track volume properly
player.addEventListener("volumechange", () => {
    userVolume = player.volume;
});

// Play track
function playTrack() {
    const src = "./" + currentList + "/" + playlists[currentList][currentTrack];
    player.src = src;
    player.volume = userVolume;

    player.play().catch(() => {}); // avoids autoplay crash

    preloadNext();
}

// Preload next
function preloadNext() {
    let nextIndex = (currentTrack + 1) % playlists[currentList].length;
    nextAudio = new Audio("./" + currentList + "/" + playlists[currentList][nextIndex]);
    nextAudio.volume = 0;
}

// SAFE crossfade trigger
player.addEventListener("timeupdate", () => {
    if (
        !fading &&
        player.duration &&
        !isNaN(player.duration) &&
        player.duration - player.currentTime < 3
    ) {
        startCrossfade();
    }
});

// Crossfade
function startCrossfade() {
    fading = true;

    nextAudio.currentTime = 0;
    nextAudio.play().catch(() => {});

    let fade = 0;

    let interval = setInterval(() => {
        fade += 0.05;

        player.volume = userVolume * (1 - fade);
        nextAudio.volume = userVolume * fade;

        if (fade >= 1) {
            clearInterval(interval);

            player.pause();

            player.src = nextAudio.src;
            player.volume = userVolume;
            player.play().catch(() => {});

            currentTrack = (currentTrack + 1) % playlists[currentList].length;

            preloadNext();
            fading = false;
        }
    }, 200);
}

// Mode switch
function setMode(mode) {
    currentList = mode;
    currentTrack = 0;
    fading = false;

    nextAudio.pause();
    playTrack();
}

// Start
playTrack();

});

</script>
