<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>RDP Ambient Sounds</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #121212;
    color: white;
    text-align: center;
}

h1 {
    padding: 20px;
}

button {
    background: #1db954;
    border: none;
    color: white;
    padding: 15px 25px;
    margin: 10px;
    border-radius: 10px;
    cursor: pointer;
}

audio {
    margin-top: 20px;
    width: 80%;
}
</style>
</head>

<body>

<h1>🦷 RDP Ambient Sounds</h1>

<button onclick="setMode('calm')">🦷 Waiting Room</button>
<button onclick="setMode('neutral')">🛠 Treatment</button>
<button onclick="setMode('uplift')">☕ Staff</button>

<br><br>

<audio id="player" controls autoplay></audio>

<script>

const playlists = {
    calm: [
        "Lifted.mp3",
        "Used to This.mp3",
        "84-85.mp3",
        "Mystical Magical.mp3",
        "No Time To Talk.mp3",
        "Tangerine.mp3"
    ],
    neutral: [
        "Lifted.mp3",
        "Used to This.mp3"
    ],
    uplift: [
        "Tangerine.mp3"
    ]
};

let currentList = "calm";
let currentTrack = 0;

let currentAudio = new Audio();
let nextAudio = new Audio();

currentAudio.volume = 1;
nextAudio.volume = 0;

function playTrack() {
    const src = "./" + currentList + "/" + playlists[currentList][currentTrack];
    currentAudio.src = src;
    currentAudio.play();

    preloadNext();
}

function preloadNext() {
    let nextIndex = (currentTrack + 1) % playlists[currentList].length;
    nextAudio.src = "./" + currentList + "/" + playlists[currentList][nextIndex];
}

// 🔥 Crossfade before ending
currentAudio.addEventListener("timeupdate", () => {
    if (currentAudio.duration - currentAudio.currentTime < 3) {
        startCrossfade();
    }
});

let fading = false;

function startCrossfade() {
    if (fading) return;
    fading = true;

    nextAudio.currentTime = 0;
    nextAudio.play();

    let fadeInterval = setInterval(() => {
        currentAudio.volume -= 0.05;
        nextAudio.volume += 0.05;

        if (currentAudio.volume <= 0) {
            clearInterval(fadeInterval);

            currentAudio.pause();

            // Swap players
            currentAudio = nextAudio;
            nextAudio = new Audio();
            nextAudio.volume = 0;

            currentTrack = (currentTrack + 1) % playlists[currentList].length;

            preloadNext();
            fading = false;
        }
    }, 200);
}

function setMode(mode) {
    currentList = mode;
    currentTrack = 0;

    currentAudio.pause();
    nextAudio.pause();

    currentAudio = new Audio();
    nextAudio = new Audio();
    currentAudio.volume = 1;
    nextAudio.volume = 0;

    playTrack();
}

// Start
playTrack();

</script></body>
</html>
